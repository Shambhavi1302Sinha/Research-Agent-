<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | AI Research Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="signup" class="auth-page">
    <div class="auth-shell">
        <div class="auth-card">
            <h1>Create account</h1>
            <p>Start building your AI-powered research workspace.</p>
            <form id="signupForm" class="mt-4">
                <div class="mb-3">
                    <label class="form-label">Full name</label>
                    <input class="form-control" type="text" id="signupName" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" id="signupEmail" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" id="signupPassword" required>
                </div>
                <button class="btn btn-accent w-100" type="submit">Signup</button>
            </form>
            <p class="auth-switch">Already registered? <a href="login.html">Login</a></p>
            <div id="authMessage" class="mt-3 small text-warning"></div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
