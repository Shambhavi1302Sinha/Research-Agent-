<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Research Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="login" class="auth-page">
    <div class="auth-shell">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p>Sign in to continue your research workflow.</p>
            <form id="loginForm" class="mt-4">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" type="email" id="loginEmail" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input class="form-control" type="password" id="loginPassword" required>
                </div>
                <button class="btn btn-accent w-100" type="submit">Login</button>
            </form>
            <p class="auth-switch">New here? <a href="signup.html">Create an account</a></p>
            <div id="authMessage" class="mt-3 small text-warning"></div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
