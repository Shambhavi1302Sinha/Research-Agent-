<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | AI Research Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="dashboard">
    <div class="app-shell">
        <aside class="sidebar">
            <a href="dashboard.html" class="brand-mark">AI Research Agent</a>
            <nav class="nav flex-column gap-2 mt-4">
                <a class="nav-link active" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="research.html">Research Search</a>
                <a class="nav-link" href="chatbot.html">Chatbot</a>
                <a class="nav-link" href="upload.html">Upload Document</a>
                <a class="nav-link" href="history.html">History</a>
            </nav>
            <button id="themeToggle" class="btn btn-outline-light mt-auto">Toggle Theme</button>
        </aside>
        <main class="content-area">
            <div class="topbar">
                <h1>Dashboard</h1>
                <button id="logoutBtn" class="btn btn-sm btn-outline-light">Logout</button>
            </div>
            <div class="row g-4 mt-1">
                <div class="col-md-4"><div class="metric-card"><span>Research Sessions</span><strong id="researchCount">0</strong></div></div>
                <div class="col-md-4"><div class="metric-card"><span>Uploaded Documents</span><strong id="documentCount">0</strong></div></div>
                <div class="col-md-4"><div class="metric-card"><span>Chat Messages</span><strong id="chatCount">0</strong></div></div>
            </div>
            <div class="row g-4 mt-1">
                <div class="col-lg-6">
                    <div class="panel-card">
                        <h3>Recent Topics</h3>
                        <ul id="recentTopics" class="plain-list"></ul>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="panel-card">
                        <h3>Uploaded Documents</h3>
                        <ul id="uploadedDocuments" class="plain-list"></ul>
                    </div>
                </div>
            </div>
            <div class="panel-card mt-4">
                <h3>Activity Snapshot</h3>
                <p id="activitySnapshot" class="mb-0"></p>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
