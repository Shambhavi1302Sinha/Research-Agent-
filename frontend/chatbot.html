<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot | AI Research Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="chat">
    <div class="app-shell">
        <aside class="sidebar">
            <a href="dashboard.html" class="brand-mark">AI Research Agent</a>
            <nav class="nav flex-column gap-2 mt-4">
                <a class="nav-link" href="dashboard.html">Dashboard</a>
                <a class="nav-link" href="research.html">Research Search</a>
                <a class="nav-link active" href="chatbot.html">Chatbot</a>
                <a class="nav-link" href="upload.html">Upload Document</a>
                <a class="nav-link" href="history.html">History</a>
            </nav>
        </aside>
        <main class="content-area">
            <div class="topbar"><h1>Research Chatbot</h1></div>
            <div class="chat-shell">
                <div id="chatMessages" class="chat-messages"></div>
                <form id="chatForm" class="chat-form">
                    <input id="chatInput" class="form-control" placeholder="Ask the AI assistant anything about your research..." required>
                    <button class="btn btn-accent" type="submit">Send</button>
                </form>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
